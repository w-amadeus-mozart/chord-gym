<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- ChordGym mark: three rising piano keys / progress bars.
       Colors: off-white #F2EFE8, gold #DFA33E.
       Black-key notches are true cutouts (mask), so the mark works on any background. -->
  <defs>
    <mask id="notches">
      <rect width="512" height="512" fill="white"/>
      <rect x="184" y="252" width="36" height="136" rx="18" fill="black"/>
      <rect x="292" y="252" width="36" height="136" rx="18" fill="black"/>
    </mask>
  </defs>
  <g mask="url(#notches)">
    <!-- bar 1 (short, white): gentle slanted top, rising to the right -->
    <path d="M104 306 L194 278 L194 420 L104 420 Z" fill="#F2EFE8"/>
    <!-- bar 2 (middle, gold): clear step up -->
    <path d="M211 222 L301 194 L301 420 L211 420 Z" fill="#DFA33E"/>
    <!-- bar 3 (tall, white): clear step up -->
    <path d="M318 138 L408 110 L408 420 L318 420 Z" fill="#F2EFE8"/>
  </g>
</svg>
